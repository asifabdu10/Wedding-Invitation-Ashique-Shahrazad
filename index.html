<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/as-logo.svg" />
  <title>Wedding Invitation | Ashique & Shahrazad</title>
  <meta name="description" content="You are cordially invited to the wedding of Ashique Abdulla and Shahrazad Wahab." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Lato:wght@300;700&family=Luxurious+Script&display=swap" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Lato:wght@300;700&family=Luxurious+Script&display=swap"
    rel="stylesheet" />
  <style>
    /* Critical CSS for First Paint */
    body {
      margin: 0;
      padding: 0;
      background-color: #fff5f6;
      overflow: hidden;
    }
    #root:empty {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .initial-loader {
      font-family: 'Luxurious Script', cursive, serif;
      font-size: 4rem;
      color: #b05a68;
      animation: initialPulse 1.5s ease-in-out infinite;
    }
    .initial-sub {
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #d4a0a8;
      margin-top: 10px;
    }
    @keyframes initialPulse {
      0%, 100% { opacity: 0.4; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1.02); }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- This content is shown only before React hydrants -->
    <div class="initial-loader">A &amp; S</div>
    <div class="initial-sub">Invitation is loading...</div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
